<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farled</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #09090b;
      --surface:  #18181b;
      --border:   #27272a;
      --input-bd: #3f3f46;
      --text:     #fafafa;
      --muted:    #e4e4e7;
      --subtle:   #d4d4d8;
      --dim:      #a1a1aa;
      --accent:   #3ecfcc;
      --error:    #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }

    body { background: #000; }

    /* ── Full-screen map ── */
    #map {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── Floating card ── */
    .card {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 900;
      width: 288px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      background: rgba(9, 9, 11, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      color: var(--text);
    }

    .card::-webkit-scrollbar { width: 3px; }
    .card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Header ── */
    .card-header {
      padding: 18px 18px 14px;
    }

    .app-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .app-subtitle {
      font-size: 12px;
      color: var(--subtle);
      margin-top: 3px;
    }

    /* ── Body ── */
    .card-body {
      padding: 4px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
    }

    /* ── Input ── */
    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--input-bd);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 34px 9px 12px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    .search-input:focus {
      border-color: var(--dim);
      box-shadow: 0 0 0 2px rgba(161, 161, 170, 0.15);
    }
    .search-input::placeholder { color: var(--dim); }
    .search-input.pinned { border-color: var(--accent); color: var(--accent); }

    .search-icon {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      font-size: 14px;
      pointer-events: none;
    }

    /* ── Pin button (standalone, below input) ── */
    .pin-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--dim);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      width: fit-content;
    }
    .pin-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(62,207,204,0.06); }
    .pin-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(62,207,204,0.1); }

    /* ── Separator ── */
    .sep { height: 1px; background: var(--border); }

    /* ── Dropdown ── */
    .dropdown {
      position: absolute;
      top: calc(100% + 4px); left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--input-bd);
      border-radius: 8px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .dropdown::-webkit-scrollbar { width: 3px; }
    .dropdown::-webkit-scrollbar-thumb { background: var(--border); }
    .dropdown.open { display: block; }

    .dd-section {
      padding: 6px 12px 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .dd-item {
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .dd-item:hover, .dd-item.focused { background: var(--border); }

    .dd-item-name {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dd-item-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }

    /* ── Calculate button ── */
    .calc-btn {
      width: 100%;
      padding: 10px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .calc-btn:not(:disabled):hover { background: #e4e4e7; }
    .calc-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Result ── */
    .result {
      margin: 0 18px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: none;
      animation: slide-in 0.25s ease;
    }
    .result.show { display: block; }
    @keyframes slide-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .result-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
    }

    .dist-row { display: flex; align-items: baseline; gap: 5px; }
    .dist-num { font-size: 32px; font-weight: 600; color: var(--text); line-height: 1; }
    .dist-unit { font-size: 14px; color: var(--subtle); }
    .dist-km { font-size: 12px; color: var(--dim); margin-top: 4px; }

    .result-route {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .result-stop { display: flex; align-items: flex-start; gap: 8px; }
    .stop-pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .stop-pip.from { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .stop-pip.to   { background: var(--subtle); }
    .stop-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .stop-name { font-size: 13px; color: var(--muted); line-height: 1.3; margin-top: 1px; }

    /* ── Error ── */
    .error-msg {
      margin: 0 18px 18px;
      padding: 12px 14px;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      font-size: 12px;
      color: var(--error);
      display: none;
      line-height: 1.5;
    }
    .error-msg.show { display: block; }

    /* ── Status bar ── */
    .statusbar {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--dim);
    }
    .spip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .spip.ok   { background: var(--accent); animation: blink 3s ease-in-out infinite; }
    .spip.warn { background: #fbbf24; animation: blink 1.5s ease-in-out infinite; }
    .spip.err  { background: var(--error); }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  </style>
</head>
<body>

<div id="map"></div>

<div class="card">

  <div class="card-header">
    <div class="app-title">Farled</div>
    <div class="app-subtitle">Distanser til sjøs i Norge</div>
  </div>

  <div class="card-body">

    <div class="field">
      <label class="field-label">Fra kai</label>
      <div class="search-wrap">
        <input type="text" class="search-input" id="from-input" placeholder="Søk etter kai eller adresse…" autocomplete="off"/>
        <span class="search-icon">⌕</span>
        <div class="dropdown" id="from-dd"></div>
      </div>
      <button class="pin-btn" id="from-pin" title="Sett pin i kart">📍 Sett pin i kart</button>
    </div>

    <div class="sep"></div>

    <div class="field">
      <label class="field-label">Til kai</label>
      <div class="search-wrap">
        <input type="text" class="search-input" id="to-input" placeholder="Søk etter kai eller adresse…" autocomplete="off"/>
        <span class="search-icon">⌕</span>
        <div class="dropdown" id="to-dd"></div>
      </div>
      <button class="pin-btn" id="to-pin" title="Sett pin i kart">📍 Sett pin i kart</button>
    </div>

    <button class="calc-btn" id="calc-btn" disabled>
      <span id="btn-label">Beregn sjøvei</span>
    </button>

  </div>

  <div class="result" id="result">
    <div class="result-eyebrow">Beregnet sjøvei</div>
    <div class="dist-row">
      <span class="dist-num" id="dist-nm">—</span>
      <span class="dist-unit">nm</span>
    </div>
    <div class="dist-km" id="dist-km"></div>
    <div class="result-route">
      <div class="result-stop">
        <div class="stop-pip from"></div>
        <div><div class="stop-label">Fra</div><div class="stop-name" id="r-from"></div></div>
      </div>
      <div class="result-stop">
        <div class="stop-pip to"></div>
        <div><div class="stop-label">Til</div><div class="stop-name" id="r-to"></div></div>
      </div>
    </div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="statusbar">
    <div class="spip warn" id="spip"></div>
    <span id="stxt">Starter…</span>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── State ────────────────────────────────────────────────────
let allQuays = [];
let fromPoint = null, toPoint = null;
let pinMode = null;
let routeLayer = null, shadowLayer = null, fromMarker = null, toMarker = null;
let waypointMarkers = [], routeLatLngs = [];
let pinMarkerFrom = null, pinMarkerTo = null;

// ─── Map ─────────────────────────────────────────────────────
const map = L.map('map', { center: [65.5, 14.0], zoom: 5, zoomControl: false });
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
  attribution: '© OpenSeaMap', opacity: 0.8, maxZoom: 18,
}).addTo(map);

// ─── Status ──────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('spip').className = 'spip ' + state;
  document.getElementById('stxt').textContent = text;
}

// ─── Quays ───────────────────────────────────────────────────
async function loadQuays() {
  setStatus('warn', 'Henter kai-liste fra NSR…');
  try {
    const r = await fetch('/api/quays');
    allQuays = await r.json();
    setStatus('ok', allQuays.length + ' kaier lastet');
  } catch (e) {
    setStatus('err', 'Kunne ikke hente kaier');
  }
}

// ─── Pin mode ─────────────────────────────────────────────────
function setPinMode(which) {
  if (pinMode === which) {
    pinMode = null;
    map.getContainer().style.cursor = '';
    document.getElementById('from-pin').classList.remove('active');
    document.getElementById('to-pin').classList.remove('active');
    return;
  }
  pinMode = which;
  map.getContainer().style.cursor = 'crosshair';
  document.getElementById('from-pin').classList.toggle('active', which === 'from');
  document.getElementById('to-pin').classList.toggle('active', which === 'to');
  setStatus('ok', 'Klikk i kartet for å sette ' + (which === 'from' ? 'startpunkt' : 'endepunkt'));
}

document.getElementById('from-pin').addEventListener('click', () => setPinMode('from'));
document.getElementById('to-pin').addEventListener('click',   () => setPinMode('to'));

map.on('click', e => {
  if (!pinMode) return;
  const { lat, lng } = e.latlng;
  const label = lat.toFixed(4) + ', ' + lng.toFixed(4);
  if (pinMode === 'from') {
    setPoint('from', { lat, lon: lng, name: 'Pin: ' + label });
    document.getElementById('from-input').value = 'Pin: ' + label;
    document.getElementById('from-input').classList.add('pinned');
    if (pinMarkerFrom) map.removeLayer(pinMarkerFrom);
    pinMarkerFrom = L.marker([lat, lng], { icon: pinIcon('#3ecfcc') })
      .bindPopup('Fra: ' + label).addTo(map);
  } else {
    setPoint('to', { lat, lon: lng, name: 'Pin: ' + label });
    document.getElementById('to-input').value = 'Pin: ' + label;
    document.getElementById('to-input').classList.add('pinned');
    if (pinMarkerTo) map.removeLayer(pinMarkerTo);
    pinMarkerTo = L.marker([lat, lng], { icon: pinIcon('#c4965a') })
      .bindPopup('Til: ' + label).addTo(map);
  }
  setPinMode(null);
});

// ─── Shared point setter ──────────────────────────────────────
function setPoint(which, pt) {
  if (which === 'from') fromPoint = pt;
  else toPoint = pt;
  updateBtn();
}

function clearPoint(which) {
  if (which === 'from') {
    fromPoint = null;
    document.getElementById('from-input').classList.remove('pinned');
  } else {
    toPoint = null;
    document.getElementById('to-input').classList.remove('pinned');
  }
  updateBtn();
}

function updateBtn() {
  document.getElementById('calc-btn').disabled = !(fromPoint && toPoint);
}

// ─── Geocode (Kartverket) ─────────────────────────────────────
let geocodeTimers = {};
async function geocode(q) {
  if (q.length < 2) return [];
  try {
    const r = await fetch('/api/geocode?q=' + encodeURIComponent(q));
    return await r.json();
  } catch { return []; }
}

// ─── Hybrid search dropdown ───────────────────────────────────
function makeSearch(inputId, ddId, which) {
  const inp = document.getElementById(inputId);
  const dd  = document.getElementById(ddId);
  let focusIdx = -1;

  function close() { dd.classList.remove('open'); focusIdx = -1; }

  function buildSection(label) {
    const el = document.createElement('div');
    el.className = 'dd-section';
    el.textContent = label;
    return el;
  }

  function buildQuayItem(q) {
    const el = document.createElement('div');
    el.className = 'dd-item';
    const name = document.createElement('div');
    name.className = 'dd-item-name';
    name.textContent = q.stop_name;
    const sub = document.createElement('div');
    sub.className = 'dd-item-sub';
    sub.textContent = q.id;
    el.appendChild(name); el.appendChild(sub);
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      inp.value = q.stop_name;
      inp.classList.remove('pinned');
      setPoint(which, { lat: q.lat, lon: q.lon, name: q.stop_name });
      close();
    });
    return el;
  }

  function buildAddrItem(a) {
    const el = document.createElement('div');
    el.className = 'dd-item';
    const name = document.createElement('div');
    name.className = 'dd-item-name';
    name.textContent = a.name;
    const sub = document.createElement('div');
    sub.className = 'dd-item-sub';
    sub.textContent = (a.postcode ? a.postcode + ' ' : '') + (a.poststed || '') + (a.municipality ? ', ' + a.municipality : '');
    el.appendChild(name); el.appendChild(sub);
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      inp.value = a.name + (a.municipality ? ', ' + a.municipality : '');
      inp.classList.remove('pinned');
      setPoint(which, { lat: a.lat, lon: a.lon, name: inp.value });
      close();
    });
    return el;
  }

  function render(quays, addrs) {
    while (dd.firstChild) dd.removeChild(dd.firstChild);
    const frag = document.createDocumentFragment();
    if (quays.length) {
      frag.appendChild(buildSection('Kaier (NSR)'));
      quays.slice(0, 20).forEach(q => frag.appendChild(buildQuayItem(q)));
    }
    if (addrs.length) {
      frag.appendChild(buildSection('Adresser'));
      addrs.forEach(a => frag.appendChild(buildAddrItem(a)));
    }
    if (!quays.length && !addrs.length) { close(); return; }
    dd.appendChild(frag);
    dd.classList.add('open');
    focusIdx = -1;
  }

  inp.addEventListener('input', () => {
    clearPoint(which);
    const q = inp.value.trim();
    if (q.length < 2) { close(); return; }
    const ql = q.toLowerCase();
    const quayMatches = allQuays.filter(k =>
      k.stop_name.toLowerCase().includes(ql) || k.name.toLowerCase().includes(ql)
    );
    clearTimeout(geocodeTimers[which]);
    geocodeTimers[which] = setTimeout(async () => {
      const addrs = await geocode(q);
      render(quayMatches, Array.isArray(addrs) ? addrs : []);
    }, 300);
    render(quayMatches, []);
  });

  inp.addEventListener('keydown', e => {
    const items = dd.querySelectorAll('.dd-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      focusIdx = Math.min(focusIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('focused', i === focusIdx));
      e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      focusIdx = Math.max(focusIdx - 1, 0);
      items.forEach((el, i) => el.classList.toggle('focused', i === focusIdx));
      e.preventDefault();
    } else if (e.key === 'Enter' && focusIdx >= 0) {
      items[focusIdx].dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
    } else if (e.key === 'Escape') { close(); }
  });

  document.addEventListener('click', e => {
    if (!inp.contains(e.target) && !dd.contains(e.target)) close();
  });
}

makeSearch('from-input', 'from-dd', 'from');
makeSearch('to-input',   'to-dd',   'to');

// ─── Calculate ───────────────────────────────────────────────
document.getElementById('calc-btn').addEventListener('click', async () => {
  if (!fromPoint || !toPoint) return;
  const btn = document.getElementById('calc-btn');
  btn.disabled = true;
  document.getElementById('btn-label').textContent = 'Beregner…';
  hideResult(); hideError();

  try {
    const r = await fetch('/api/route', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        from_lat: fromPoint.lat, from_lon: fromPoint.lon, from_name: fromPoint.name,
        to_lat:   toPoint.lat,   to_lon:   toPoint.lon,   to_name:   toPoint.name,
      }),
    });
    const data = await r.json();
    if (!r.ok) { showError(data.error || 'Ukjent feil'); return; }
    showResult(data);
    drawRoute(data);
    if (pinMarkerFrom) { map.removeLayer(pinMarkerFrom); pinMarkerFrom = null; }
    if (pinMarkerTo)   { map.removeLayer(pinMarkerTo);   pinMarkerTo   = null; }
  } catch (e) {
    showError('Nettverksfeil: ' + e.message);
  } finally {
    btn.disabled = !(fromPoint && toPoint);
    document.getElementById('btn-label').textContent = 'Beregn sjøvei';
  }
});

// ─── Result/Error display ────────────────────────────────────
function showResult(data) {
  document.getElementById('dist-nm').textContent = data.distance_nm.toFixed(1);
  document.getElementById('dist-km').textContent = '≈ ' + data.distance_km + ' km langs farled';
  document.getElementById('r-from').textContent = data.from_name;
  document.getElementById('r-to').textContent   = data.to_name;
  document.getElementById('result').classList.add('show');
}
function hideResult() { document.getElementById('result').classList.remove('show'); }
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('error-msg').classList.remove('show'); }

// ─── Map drawing ─────────────────────────────────────────────
function pipIcon(color) {
  return L.divIcon({
    html: `<div style="width:22px;height:22px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 0 8px ${color};cursor:grab;box-sizing:border-box"></div>`,
    className: '',
    iconSize: [22, 22],
    iconAnchor: [11, 11],
  });
}

function pinIcon(color) {
  const svg = `<svg width="20" height="28" viewBox="0 0 20 28" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 0C4.5 0 0 4.5 0 10c0 7 10 18 10 18s10-11 10-18C20 4.5 15.5 0 10 0z" fill="${color}" opacity="0.9"/>
    <circle cx="10" cy="10" r="4" fill="white" opacity="0.9"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [20,28], iconAnchor: [10,28] });
}

function haversineNm(lat1, lon1, lat2, lon2) {
  const R = 3440.065;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2
          + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function updateDistance() {
  let total = 0;
  for (let i = 0; i < routeLatLngs.length - 1; i++) {
    total += haversineNm(routeLatLngs[i][0], routeLatLngs[i][1],
                         routeLatLngs[i+1][0], routeLatLngs[i+1][1]);
  }
  document.getElementById('dist-nm').textContent = total.toFixed(1);
  document.getElementById('dist-km').textContent = '≈ ' + (total * 1.852).toFixed(1) + ' km';
}

const wpIcon = L.divIcon({
  className: '',
  html: `<div style="width:10px;height:10px;border-radius:50%;background:#1a1a1a;border:2px solid #3ecfcc;cursor:grab;margin:-5px 0 0 -5px"></div>`,
  iconSize: [0, 0],
});

function drawRoute(data) {
  [routeLayer, shadowLayer, fromMarker, toMarker].forEach(l => { if (l) map.removeLayer(l); });
  waypointMarkers.forEach(m => map.removeLayer(m));
  waypointMarkers = [];

  // Build mutable latlngs from waypoints [[lon,lat],...]
  routeLatLngs = data.waypoints.map(wp => [wp[1], wp[0]]);

  shadowLayer = L.polyline(routeLatLngs, { color: '#3ecfcc', weight: 10, opacity: 0.12, lineCap: 'round' }).addTo(map);
  routeLayer  = L.polyline(routeLatLngs, { color: '#3ecfcc', weight: 3, opacity: 0.95, lineCap: 'round', lineJoin: 'round' }).addTo(map);

  // Draggable intermediate waypoints
  for (let i = 1; i < routeLatLngs.length - 1; i++) {
    const idx = i;
    const m = L.marker(routeLatLngs[idx], { icon: wpIcon, draggable: true, zIndexOffset: 100 }).addTo(map);
    m.on('dragstart', () => map.dragging.disable());
    m.on('drag', () => {
      const ll = m.getLatLng();
      routeLatLngs[idx] = [ll.lat, ll.lng];
      routeLayer.setLatLngs(routeLatLngs);
      shadowLayer.setLatLngs(routeLatLngs);
      updateDistance();
    });
    m.on('dragend', () => map.dragging.enable());
    waypointMarkers.push(m);
  }

  const lastIdx = routeLatLngs.length - 1;
  function makeDraggableEndpoint(latlng, color, name, idx) {
    const m = L.marker(latlng, { icon: pipIcon(color), draggable: true, zIndexOffset: 200 }).bindPopup(name).addTo(map);
    m.on('dragstart', () => map.dragging.disable());
    m.on('drag', () => {
      const ll = m.getLatLng();
      routeLatLngs[idx] = [ll.lat, ll.lng];
      routeLayer.setLatLngs(routeLatLngs);
      shadowLayer.setLatLngs(routeLatLngs);
      updateDistance();
    });
    m.on('dragend', () => map.dragging.enable());
    return m;
  }

  fromMarker = makeDraggableEndpoint(routeLatLngs[0], '#3ecfcc', data.from_name, 0);
  toMarker   = makeDraggableEndpoint(routeLatLngs[lastIdx], '#c4965a', data.to_name, lastIdx);

  map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
}

// ─── Init ────────────────────────────────────────────────────
(async () => {
  try {
    const s = await fetch('/api/status').then(r => r.json());
    if (!s.ok) {
      setStatus('err', 'Farled-data mangler — kjør: python download_farled.py');
      return;
    }
    setStatus('ok', 'Graf: ' + s.nodes.toLocaleString('no') + ' noder');
    await loadQuays();
  } catch (e) {
    setStatus('err', 'Backend ikke tilgjengelig — start app.py');
  }
})();
</script>
