<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sjøvei-kalkulator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:      #08141f;
      --navy-mid:  #0f2030;
      --navy-lift: #162840;
      --navy-hi:   #1e3a55;
      --gold:      #c4965a;
      --gold-lt:   #ddb87a;
      --sea:       #3ecfcc;
      --text:      #c8bfaa;
      --text-dim:  #6a7e8a;
      --border:    rgba(196,150,90,0.22);
      --panel-w:   340px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      font-family: 'Space Mono', monospace;
      background: var(--navy);
      color: var(--text);
    }

    /* ═════ LEFT PANEL ═════ */
    .panel {
      width: var(--panel-w);
      min-width: var(--panel-w);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(160deg, #0d1e2e 0%, #081320 100%);
      border-right: 1px solid var(--border);
      position: relative;
      z-index: 900;
      overflow: hidden;
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(196,150,90,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(196,150,90,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }

    /* Header */
    .panel-head {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .head-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .logo-block h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 0.88;
      color: #fff;
    }

    .logo-block h1 em { font-style: normal; color: var(--gold); }

    .logo-block .tagline {
      margin-top: 7px;
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* Compass */
    .compass { width: 54px; height: 54px; flex-shrink: 0; }
    .compass .rose-outer { transform-origin: 50% 50%; animation: rose-spin 90s linear infinite; }
    .compass .rose-inner { transform-origin: 50% 50%; animation: rose-spin 45s linear infinite reverse; }
    @keyframes rose-spin { to { transform: rotate(360deg); } }

    /* Controls */
    .controls {
      padding: 22px 22px 10px;
      flex: 1;
      overflow: visible;
      position: relative;
      z-index: 1;
    }

    .field-label {
      font-size: 0.55rem;
      letter-spacing: 0.28em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .field-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .search-wrap { position: relative; margin-bottom: 6px; }

    .search-input {
      width: 100%;
      background: var(--navy-lift);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 60px 11px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(196,150,90,0.12); }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input.pinned { border-color: var(--sea); color: var(--sea); }

    .search-icon {
      position: absolute;
      right: 34px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 0.7rem;
      pointer-events: none;
    }

    .pin-btn {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 32px;
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .pin-btn:hover { color: var(--sea); background: rgba(62,207,204,0.08); }
    .pin-btn.active { color: var(--sea); background: rgba(62,207,204,0.15); }

    .dd-section {
      padding: 4px 10px 2px;
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      background: var(--navy);
    }
    .dd-item-sub { font-size: 0.58rem; color: var(--text-dim); margin-top: 2px; }

    .dropdown {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-top: none;
      max-height: 220px;
      overflow-y: auto;
      z-index: 200;
      display: none;
    }
    .dropdown::-webkit-scrollbar { width: 3px; }
    .dropdown::-webkit-scrollbar-thumb { background: var(--border); }
    .dropdown.open { display: block; }

    .dd-item {
      padding: 9px 12px;
      cursor: pointer;
      border-bottom: 1px solid rgba(196,150,90,0.08);
      transition: background 0.12s;
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover, .dd-item.focused { background: var(--navy-hi); }

    .dd-item-name {
      font-size: 0.74rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dd-item-id { font-size: 0.58rem; color: var(--text-dim); margin-top: 2px; }

    /* Connector */
    .connector {
      display: flex;
      align-items: center;
      padding: 10px 0 10px 6px;
    }
    .connector-line {
      width: 1px; height: 28px;
      background: linear-gradient(to bottom, var(--sea), var(--gold));
      margin-left: 5px;
    }

    /* Button */
    .calc-btn {
      width: 100%;
      margin-top: 18px;
      padding: 13px 16px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.25s;
    }
    .calc-btn .btn-fill {
      position: absolute; inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .calc-btn:not(:disabled):hover .btn-fill { transform: translateX(0); }
    .calc-btn:not(:disabled):hover { color: var(--navy); }
    .calc-btn .btn-label { position: relative; z-index: 1; }
    .calc-btn:disabled { opacity: 0.35; cursor: not-allowed; border-color: var(--text-dim); color: var(--text-dim); }

    /* Result */
    .result {
      margin: 0 22px 12px;
      border: 1px solid rgba(62,207,204,0.3);
      background: linear-gradient(135deg, rgba(62,207,204,0.05), transparent);
      padding: 18px;
      display: none;
      position: relative;
      z-index: 1;
      animation: slide-in 0.35s ease;
    }
    .result.show { display: block; }
    @keyframes slide-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .result-eyebrow { font-size: 0.52rem; letter-spacing: 0.25em; color: var(--sea); text-transform: uppercase; margin-bottom: 10px; }

    .dist-row { display: flex; align-items: baseline; gap: 6px; }
    .dist-num { font-family: 'Cormorant Garamond', serif; font-size: 3.8rem; font-weight: 600; color: #fff; line-height: 1; }
    .dist-unit { font-size: 0.85rem; color: var(--sea); letter-spacing: 0.08em; }
    .dist-km { font-size: 0.65rem; color: var(--text-dim); margin-top: 3px; }

    .result-route { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(196,150,90,0.15); }
    .result-stop { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px; }
    .stop-pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .stop-pip.from { background: var(--sea); box-shadow: 0 0 6px var(--sea); }
    .stop-pip.to   { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
    .stop-label { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.15em; }
    .stop-name { color: var(--text); font-size: 0.72rem; line-height: 1.3; }

    /* Error */
    .error-msg {
      margin: 0 22px 12px;
      padding: 12px 14px;
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.3);
      font-size: 0.68rem;
      color: #ff9090;
      display: none;
      position: relative;
      z-index: 1;
      line-height: 1.5;
    }
    .error-msg.show { display: block; }

    /* Status bar */
    .statusbar {
      padding: 10px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.58rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      position: relative;
      z-index: 1;
    }
    .spip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .spip.ok   { background: var(--sea); animation: blink 3s ease-in-out infinite; }
    .spip.warn { background: var(--gold); animation: blink 1.5s ease-in-out infinite; }
    .spip.err  { background: #ff6060; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* Map */
    #map { flex: 1; height: 100vh; }
  </style>
</head>
<body>

<aside class="panel">

  <div class="panel-head">
    <div class="head-row">
      <div class="logo-block">
        <h1>SJØ<em>VEI</em></h1>
        <p class="tagline">Farled-kalkulator · Norge</p>
      </div>

      <svg class="compass" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(196,150,90,0.25)" stroke-width="1"/>
        <g class="rose-outer" stroke="rgba(196,150,90,0.5)" stroke-width="1">
          <line x1="50" y1="6"  x2="50" y2="14"/>
          <line x1="50" y1="86" x2="50" y2="94"/>
          <line x1="6"  y1="50" x2="14" y2="50"/>
          <line x1="86" y1="50" x2="94" y2="50"/>
          <line x1="17.9" y1="17.9" x2="23.6" y2="23.6"/>
          <line x1="76.4" y1="76.4" x2="82.1" y2="82.1"/>
          <line x1="82.1" y1="17.9" x2="76.4" y2="23.6"/>
          <line x1="23.6" y1="76.4" x2="17.9" y2="82.1"/>
        </g>
        <g class="rose-inner" fill="none">
          <polygon points="50,12 46,50 50,46 54,50" fill="#c4965a"/>
          <polygon points="50,88 46,50 50,54 54,50" fill="rgba(196,150,90,0.35)"/>
          <polygon points="88,50 50,46 54,50 50,54" fill="rgba(196,150,90,0.35)"/>
          <polygon points="12,50 50,46 46,50 50,54" fill="rgba(196,150,90,0.35)"/>
          <circle cx="50" cy="50" r="4" fill="#c4965a"/>
          <circle cx="50" cy="50" r="2" fill="#081320"/>
        </g>
        <text x="50" y="5.5" text-anchor="middle" font-family="Space Mono,monospace" font-size="7" fill="#c4965a">N</text>
      </svg>
    </div>
  </div>

  <div class="controls">

    <div class="field-label">Fra kai</div>
    <div class="search-wrap">
      <input type="text" class="search-input" id="from-input" placeholder="Kai, adresse eller pin i kart…" autocomplete="off"/>
      <span class="search-icon">⌕</span>
      <button class="pin-btn" id="from-pin" title="Sett pin i kart">📍</button>
      <div class="dropdown" id="from-dd"></div>
    </div>

    <div class="connector"><div class="connector-line"></div></div>

    <div class="field-label">Til kai</div>
    <div class="search-wrap">
      <input type="text" class="search-input" id="to-input" placeholder="Kai, adresse eller pin i kart…" autocomplete="off"/>
      <span class="search-icon">⌕</span>
      <button class="pin-btn" id="to-pin" title="Sett pin i kart">📍</button>
      <div class="dropdown" id="to-dd"></div>
    </div>

    <button class="calc-btn" id="calc-btn" disabled>
      <div class="btn-fill"></div>
      <span class="btn-label" id="btn-label">Beregn sjøvei</span>
    </button>

  </div>

  <div class="result" id="result">
    <div class="result-eyebrow">Beregnet sjøvei</div>
    <div class="dist-row">
      <span class="dist-num" id="dist-nm">—</span>
      <span class="dist-unit">nm</span>
    </div>
    <div class="dist-km" id="dist-km"></div>
    <div class="result-route">
      <div class="result-stop">
        <div class="stop-pip from"></div>
        <div><div class="stop-label">Fra</div><div class="stop-name" id="r-from"></div></div>
      </div>
      <div class="result-stop">
        <div class="stop-pip to"></div>
        <div><div class="stop-label">Til</div><div class="stop-name" id="r-to"></div></div>
      </div>
    </div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="statusbar">
    <div class="spip warn" id="spip"></div>
    <span id="stxt">Starter…</span>
  </div>

</aside>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── State ────────────────────────────────────────────────────
// Point: { lat, lon, name }
let allQuays = [];
let fromPoint = null, toPoint = null;
let pinMode = null; // 'from' | 'to' | null
let routeLayer = null, shadowLayer = null, fromMarker = null, toMarker = null;
let pinMarkerFrom = null, pinMarkerTo = null;

// ─── Map ─────────────────────────────────────────────────────
const map = L.map('map', { center: [65.5, 14.0], zoom: 5, zoomControl: false });
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
  attribution: '© OpenSeaMap', opacity: 0.8, maxZoom: 18,
}).addTo(map);

// ─── Status ──────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('spip').className = 'spip ' + state;
  document.getElementById('stxt').textContent = text;
}

// ─── Quays ───────────────────────────────────────────────────
async function loadQuays() {
  setStatus('warn', 'Henter kai-liste fra NSR…');
  try {
    const r = await fetch('/api/quays');
    allQuays = await r.json();
    setStatus('ok', allQuays.length + ' kaier lastet');
  } catch (e) {
    setStatus('err', 'Kunne ikke hente kaier');
  }
}

// ─── Pin mode ─────────────────────────────────────────────────
function setPinMode(which) {
  if (pinMode === which) {
    // toggle off
    pinMode = null;
    map.getContainer().style.cursor = '';
    document.getElementById('from-pin').classList.remove('active');
    document.getElementById('to-pin').classList.remove('active');
    return;
  }
  pinMode = which;
  map.getContainer().style.cursor = 'crosshair';
  document.getElementById('from-pin').classList.toggle('active', which === 'from');
  document.getElementById('to-pin').classList.toggle('active', which === 'to');
  setStatus('ok', 'Klikk i kartet for å sette ' + (which === 'from' ? 'startpunkt' : 'endepunkt'));
}

document.getElementById('from-pin').addEventListener('click', () => setPinMode('from'));
document.getElementById('to-pin').addEventListener('click',   () => setPinMode('to'));

map.on('click', e => {
  if (!pinMode) return;
  const { lat, lng } = e.latlng;
  const label = lat.toFixed(4) + ', ' + lng.toFixed(4);
  if (pinMode === 'from') {
    setPoint('from', { lat, lon: lng, name: 'Pin: ' + label });
    document.getElementById('from-input').value = 'Pin: ' + label;
    document.getElementById('from-input').classList.add('pinned');
    if (pinMarkerFrom) map.removeLayer(pinMarkerFrom);
    pinMarkerFrom = L.marker([lat, lng], { icon: pinIcon('#3ecfcc') })
      .bindPopup('Fra: ' + label).addTo(map);
  } else {
    setPoint('to', { lat, lon: lng, name: 'Pin: ' + label });
    document.getElementById('to-input').value = 'Pin: ' + label;
    document.getElementById('to-input').classList.add('pinned');
    if (pinMarkerTo) map.removeLayer(pinMarkerTo);
    pinMarkerTo = L.marker([lat, lng], { icon: pinIcon('#c4965a') })
      .bindPopup('Til: ' + label).addTo(map);
  }
  setPinMode(null);
});

// ─── Shared point setter ──────────────────────────────────────
function setPoint(which, pt) {
  if (which === 'from') fromPoint = pt;
  else toPoint = pt;
  updateBtn();
}

function clearPoint(which) {
  if (which === 'from') {
    fromPoint = null;
    document.getElementById('from-input').classList.remove('pinned');
  } else {
    toPoint = null;
    document.getElementById('to-input').classList.remove('pinned');
  }
  updateBtn();
}

function updateBtn() {
  document.getElementById('calc-btn').disabled = !(fromPoint && toPoint);
}

// ─── Geocode (Kartverket) ─────────────────────────────────────
let geocodeTimers = {};
async function geocode(q) {
  if (q.length < 2) return [];
  try {
    const r = await fetch('/api/geocode?q=' + encodeURIComponent(q));
    return await r.json();
  } catch { return []; }
}

// ─── Hybrid search dropdown ───────────────────────────────────
function makeSearch(inputId, ddId, which) {
  const inp = document.getElementById(inputId);
  const dd  = document.getElementById(ddId);
  let focusIdx = -1;

  function close() { dd.classList.remove('open'); focusIdx = -1; }

  function buildSection(label) {
    const el = document.createElement('div');
    el.className = 'dd-section';
    el.textContent = label;
    return el;
  }

  function buildQuayItem(q) {
    const el = document.createElement('div');
    el.className = 'dd-item';
    const name = document.createElement('div');
    name.className = 'dd-item-name';
    name.textContent = q.stop_name;
    const sub = document.createElement('div');
    sub.className = 'dd-item-sub';
    sub.textContent = q.id;
    el.appendChild(name); el.appendChild(sub);
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      inp.value = q.stop_name;
      inp.classList.remove('pinned');
      setPoint(which, { lat: q.lat, lon: q.lon, name: q.stop_name });
      close();
    });
    return el;
  }

  function buildAddrItem(a) {
    const el = document.createElement('div');
    el.className = 'dd-item';
    const name = document.createElement('div');
    name.className = 'dd-item-name';
    name.textContent = a.name;
    const sub = document.createElement('div');
    sub.className = 'dd-item-sub';
    sub.textContent = (a.postcode ? a.postcode + ' ' : '') + a.municipality;
    el.appendChild(name); el.appendChild(sub);
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      inp.value = a.name + (a.municipality ? ', ' + a.municipality : '');
      inp.classList.remove('pinned');
      setPoint(which, { lat: a.lat, lon: a.lon, name: inp.value });
      close();
    });
    return el;
  }

  function render(quays, addrs) {
    while (dd.firstChild) dd.removeChild(dd.firstChild);
    const frag = document.createDocumentFragment();
    if (quays.length) {
      frag.appendChild(buildSection('Kaier (NSR)'));
      quays.slice(0, 20).forEach(q => frag.appendChild(buildQuayItem(q)));
    }
    if (addrs.length) {
      frag.appendChild(buildSection('Adresser'));
      addrs.forEach(a => frag.appendChild(buildAddrItem(a)));
    }
    if (!quays.length && !addrs.length) { close(); return; }
    dd.appendChild(frag);
    dd.classList.add('open');
    focusIdx = -1;
  }

  inp.addEventListener('input', () => {
    clearPoint(which);
    const q = inp.value.trim();
    if (q.length < 2) { close(); return; }
    const ql = q.toLowerCase();
    const quayMatches = allQuays.filter(k =>
      k.stop_name.toLowerCase().includes(ql) || k.name.toLowerCase().includes(ql)
    );
    clearTimeout(geocodeTimers[which]);
    geocodeTimers[which] = setTimeout(async () => {
      const addrs = await geocode(q);
      render(quayMatches, Array.isArray(addrs) ? addrs : []);
    }, 300);
    // Show quays immediately while geocode is debounced
    render(quayMatches, []);
  });

  inp.addEventListener('keydown', e => {
    const items = dd.querySelectorAll('.dd-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      focusIdx = Math.min(focusIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('focused', i === focusIdx));
      e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      focusIdx = Math.max(focusIdx - 1, 0);
      items.forEach((el, i) => el.classList.toggle('focused', i === focusIdx));
      e.preventDefault();
    } else if (e.key === 'Enter' && focusIdx >= 0) {
      items[focusIdx].dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
    } else if (e.key === 'Escape') { close(); }
  });

  document.addEventListener('click', e => {
    if (!inp.contains(e.target) && !dd.contains(e.target)) close();
  });
}

makeSearch('from-input', 'from-dd', 'from');
makeSearch('to-input',   'to-dd',   'to');

// ─── Calculate ───────────────────────────────────────────────
document.getElementById('calc-btn').addEventListener('click', async () => {
  if (!fromPoint || !toPoint) return;
  const btn = document.getElementById('calc-btn');
  btn.disabled = true;
  document.getElementById('btn-label').textContent = 'Beregner…';
  hideResult(); hideError();

  try {
    const r = await fetch('/api/route', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        from_lat: fromPoint.lat, from_lon: fromPoint.lon, from_name: fromPoint.name,
        to_lat:   toPoint.lat,   to_lon:   toPoint.lon,   to_name:   toPoint.name,
      }),
    });
    const data = await r.json();
    if (!r.ok) { showError(data.error || 'Ukjent feil'); return; }
    showResult(data);
    drawRoute(data);
    if (pinMarkerFrom) { map.removeLayer(pinMarkerFrom); pinMarkerFrom = null; }
    if (pinMarkerTo)   { map.removeLayer(pinMarkerTo);   pinMarkerTo   = null; }
  } catch (e) {
    showError('Nettverksfeil: ' + e.message);
  } finally {
    btn.disabled = !(fromPoint && toPoint);
    document.getElementById('btn-label').textContent = 'Beregn sjøvei';
  }
});

// ─── Result/Error display ────────────────────────────────────
function showResult(data) {
  document.getElementById('dist-nm').textContent = data.distance_nm.toFixed(1);
  document.getElementById('dist-km').textContent = '≈ ' + data.distance_km + ' km langs farled';
  document.getElementById('r-from').textContent = data.from_name;
  document.getElementById('r-to').textContent   = data.to_name;
  document.getElementById('result').classList.add('show');
}
function hideResult() { document.getElementById('result').classList.remove('show'); }
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('error-msg').classList.remove('show'); }

// ─── Map drawing ─────────────────────────────────────────────
function pipIcon(color) {
  const div = document.createElement('div');
  div.style.cssText = [
    'width:14px','height:14px','border-radius:50%',
    'background:' + color,
    'border:2px solid #fff',
    'box-shadow:0 0 8px ' + color,
  ].join(';');
  return L.divIcon({ html: div.outerHTML, className: '', iconSize: [14,14], iconAnchor: [7,7] });
}

function pinIcon(color) {
  const svg = `<svg width="20" height="28" viewBox="0 0 20 28" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 0C4.5 0 0 4.5 0 10c0 7 10 18 10 18s10-11 10-18C20 4.5 15.5 0 10 0z" fill="${color}" opacity="0.9"/>
    <circle cx="10" cy="10" r="4" fill="white" opacity="0.9"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [20,28], iconAnchor: [10,28] });
}

function drawRoute(data) {
  [routeLayer, shadowLayer, fromMarker, toMarker].forEach(l => { if (l) map.removeLayer(l); });

  shadowLayer = L.geoJSON(data.route_geojson, {
    style: { color: '#3ecfcc', weight: 10, opacity: 0.12, lineCap: 'round' },
  }).addTo(map);
  routeLayer = L.geoJSON(data.route_geojson, {
    style: { color: '#3ecfcc', weight: 3, opacity: 0.95, lineCap: 'round', lineJoin: 'round' },
  }).addTo(map);

  const wps = data.waypoints;
  const a = [wps[0][1], wps[0][0]];
  const b = [wps[wps.length - 1][1], wps[wps.length - 1][0]];

  fromMarker = L.marker(a, { icon: pipIcon('#3ecfcc') }).bindPopup(data.from_name).addTo(map);
  toMarker   = L.marker(b, { icon: pipIcon('#c4965a') }).bindPopup(data.to_name).addTo(map);

  map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
}

// ─── Init ────────────────────────────────────────────────────
(async () => {
  try {
    const s = await fetch('/api/status').then(r => r.json());
    if (!s.ok) {
      setStatus('err', 'Farled-data mangler — kjør: python download_farled.py');
      return;
    }
    setStatus('ok', 'Graf: ' + s.nodes.toLocaleString('no') + ' noder');
    await loadQuays();
  } catch (e) {
    setStatus('err', 'Backend ikke tilgjengelig — start app.py');
  }
})();
</script>
